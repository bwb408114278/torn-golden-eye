databaseChangeLog:
  - changeSet:
      id: create_attack_index
      author: Bai
      preConditions:
        - onFail: MARK_RAN
        - not:
            - indexExists:
                tableName: torn_faction_attack
                indexName: idx_faction_opponent_time
            - indexExists:
                tableName: torn_attack_log
                indexName: idx_attacker_time
            - indexExists:
                tableName: torn_attack_log
                indexName: idx_defender_time
      changes:
        - createIndex:
            tableName: torn_faction_attack
            indexName: idx_faction_opponent_time
            columns:
              - column:
                  name: deleted
              - column:
                  name: attack_faction_id
              - column:
                  name: defend_faction_id
              - column:
                  name: attack_end_time
        - createIndex:
            tableName: torn_attack_log
            indexName: idx_attacker_time
            columns:
              - column:
                  name: deleted
              - column:
                  name: log_time
              - column:
                  name: attacker_id
        - createIndex:
            tableName: torn_attack_log
            indexName: idx_defender_time
            columns:
              - column:
                  name: deleted
              - column:
                  name: log_time
              - column:
                  name: defender_id
      rollback:
        - dropIndex:
            tableName: torn_faction_attack
            indexName: idx_faction_opponent_time
        - dropIndex:
            tableName: torn_attack_log
            indexName: idx_attacker_time
        - dropIndex:
            tableName: torn_attack_log
            indexName: idx_defender_time

  - changeSet:
      id: add_rw_disband_time
      author: Bai
      changes:
        - addColumn:
            tableName: torn_faction_rw
            columns:
              - column:
                  name: disband_time
                  type: TIME
                  constraints:
                    nullable: false
                  defaultValue: "00:00:00"
                  remarks: "解散时间"

  - changeSet:
      id: create_torn_setting_faction_oc_slot
      author: Bai
      changes:
        - createTable:
            tableName: torn_setting_faction_oc_disable
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                  remarks: "ID"
              - column:
                  name: faction_id
                  type: BIGINT
                  constraints:
                    nullable: false
                  remarks: "帮派ID"
              - column:
                  name: oc_name
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                  remarks: "OC名称"
              - column:
                  name: rank
                  type: INT
                  constraints:
                    nullable: false
                  remarks: "OC等级"
              - column:
                  name: deleted
                  type: TINYINT
                  defaultValueComputed: '0'
                  constraints:
                    nullable: false
                  remarks: "删除标识 1为已删除"
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "创建时间"
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "更新时间"
        - createTable:
            tableName: torn_setting_faction_oc_slot
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                  remarks: "ID"
              - column:
                  name: faction_id
                  type: BIGINT
                  constraints:
                    nullable: false
                  remarks: "帮派ID"
              - column:
                  name: oc_name
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                  remarks: "OC名称"
              - column:
                  name: rank
                  type: INT
                  constraints:
                    nullable: false
                  remarks: "OC等级"
              - column:
                  name: slot_code
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
                  remarks: "岗位编码"
              - column:
                  name: pass_rate
                  type: INT
                  constraints:
                    nullable: false
                  remarks: "成功率"
              - column:
                  name: deleted
                  type: TINYINT
                  defaultValueComputed: '0'
                  constraints:
                    nullable: false
                  remarks: "删除标识 1为已删除"
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "创建时间"
              - column:
                  name: update_time
