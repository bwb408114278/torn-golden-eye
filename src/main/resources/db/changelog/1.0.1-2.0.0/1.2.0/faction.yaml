databaseChangeLog:
  - changeSet:
      id: add_rw_upload_record
      author: Bai
      changes:
        - setTableRemarks:
            tableName: torn_faction_rw
            remarks: "帮派RW表"
        - addColumn:
            tableName: torn_faction_rw
            columns:
              - column:
                  name: larksuite_sheet_id
                  type: VARCHAR(64)
                  remarks: "飞书上传后的工作表ID"

  - changeSet:
      id: add_oc_slot_item_requirement
      author: Bai
      changes:
        - addColumn:
            tableName: torn_faction_oc_slot
            columns:
              - column:
                  name: item_requirement_id
                  type: INT
                  remarks: "需求物品ID"
              - column:
                  name: item_requirement_available
                  type: BOOLEAN
                  remarks: "是否持有需求物品"