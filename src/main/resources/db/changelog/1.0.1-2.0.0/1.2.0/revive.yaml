databaseChangeLog:
  - changeSet:
      id: create_rw_revive_table
      author: Bai
      changes:
        - createTable:
            tableName: torn_faction_rw_revive
            remarks: "RW复活记录"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  remarks: "ID"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: rw_id
                  type: BIGINT
                  remarks: "RW ID"
              - column:
                  name: faction_id
                  type: BIGINT
                  remarks: "帮派ID"
              - column:
                  name: reviver_id
                  type: BIGINT
                  remarks: "医生ID"
              - column:
                  name: reviver_name
                  type: VARCHAR(64)
                  remarks: "医生昵称"
              - column:
                  name: reviver_faction_id
                  type: BIGINT
                  remarks: "医生帮派ID"
              - column:
                  name: reviver_faction_name
                  type: VARCHAR(128)
                  remarks: "医生帮派名称"
              - column:
                  name: skill
                  type: DECIMAL(6, 2)
                  remarks: "复活技能"
              - column:
                  name: target_id
                  type: BIGINT
                  remarks: "被复活目标ID"
              - column:
                  name: target_name
                  type: VARCHAR(64)
                  remarks: "被复活目标昵称"
              - column:
                  name: target_faction_id
                  type: BIGINT
                  remarks: "被复活目标帮派ID"
              - column:
                  name: target_faction_name
                  type: VARCHAR(128)
                  remarks: "被复活目标帮派名称"
              - column:
                  name: success_chance
                  type: DECIMAL(6, 2)
                  remarks: "成功率"
              - column:
                  name: success
                  type: BOOLEAN
                  remarks: "是否成功"
              - column:
                  name: revive_time
                  type: DATETIME
                  remarks: "复活时间"
              - column:
                  name: target_life_maximum
                  type: INT
                  remarks: "目标最大血量"
              - column:
                  name: heal_amount
                  type: INT
                  remarks: "回血量"
              - column:
                  name: deleted
                  type: TINYINT
                  defaultValueComputed: '0'
                  constraints:
                    nullable: false
                  remarks: "删除标识 1为已删除"
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "创建时间"
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "更新时间"
        - addUniqueConstraint:
            tableName: torn_faction_rw_revive
            columnNames: reviver_id,target_id,revive_time
            constraintName: uk_rw_revive_user_target_time
        - createIndex:
            tableName: torn_faction_rw_revive
            indexName: idx_rw_revive_rw_faction_time
            columns:
              - column:
                  name: rw_id
              - column:
                  name: faction_id
              - column:
                  name: revive_time
        - createIndex:
            tableName: torn_faction_rw_revive
            indexName: idx_rw_revive_reviver
            columns:
              - column:
                  name: rw_id
              - column:
                  name: faction_id
              - column:
                  name: reviver_id
