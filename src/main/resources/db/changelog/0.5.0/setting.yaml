databaseChangeLog:
  - changeSet:
      id: split_faction_armory_load
      author: Bai
      changes:
        - insert:
            tableName: sys_setting
            columns:
              - column:
                  name: id
                  value: '22'
              - column:
                  name: setting_key
                  value: 'FACTION_ARMORY_LOAD_DATE'
              - column:
                  name: setting_value
                  value: '2026-01-15'

  - changeSet:
      id: auction_lark_table_dynamic
      author: Bai
      changes:
        - insert:
            tableName: sys_setting
            columns:
              - column:
                  name: id
                  value: '24'
              - column:
                  name: setting_key
                  value: 'LARK_AUCTION_TABLE_ID'
              - column:
                  name: setting_value
                  value: 'tblb6iXCwwS6kI4Y'
        - insert:
            tableName: sys_setting
            columns:
              - column:
                  name: id
                  value: '25'
              - column:
                  name: setting_key
                  value: 'LARK_AUCTION_TABLE_ROWS_COUNT'
              - column:
                  name: setting_value
                  value: '0'
        - insert:
            tableName: sys_setting
            columns:
              - column:
                  name: id
                  value: '26'
              - column:
                  name: setting_key
                  value: 'LARK_AUCTION_TABLE_START_TIME'
              - column:
                  name: setting_value
                  value: '2026-01-15'

  - changeSet:
      id: add_vip_notice_setting_flag
      author: Bai
      changes:
        - insert:
            tableName: sys_setting
            columns:
              - column:
                  name: id
                  value: '28'
              - column:
                  name: setting_key
                  value: 'VIP_NOTICE'
              - column:
                  name: setting_value
                  value: 'true'

  - changeSet:
      id: add_block_word_table
      author: Bai
      changes:
        - createTable:
            tableName: sys_block_word
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
                  autoIncrement: true
                  remarks: "ID"
              - column:
                  name: word
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
                  remarks: "屏蔽词"
              - column:
                  name: replace_word
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
                  remarks: "替换词"
              - column:
                  name: white_list
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
                  remarks: "白名单词汇"
              - column:
                  name: deleted
                  type: TINYINT
                  defaultValueComputed: '0'
                  constraints:
                    nullable: false
                  remarks: "删除标识 1为已删除"
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "创建时间"
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: "更新时间"
        - sql:
            sql: |
              INSERT INTO sys_block_word (word, replace_word, white_list) VALUES
              ('od', '欧地', 'eod,mod'),
              ('overdose', '欧地', '');